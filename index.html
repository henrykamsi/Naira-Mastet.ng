        async function claimReward(rewardId) {
            const user = loadUser();
            showLoading(true);
            try {
                const rewardRef = db.collection('rewards').doc(rewardId);
                const rewardDoc = await rewardRef.get();
                const reward = rewardDoc.data();
                if (!reward) {
                    showPopupMessage(
                        '❌ Reward Not Found',
                        'This reward no longer exists. It may have been claimed by someone else.',
                        'OK',
                        '',
                        'reward_not_found'
                    );
                    showLoading(false);
                    return;
                }
                if (reward.claimed) {
                    const claimedBy = userDataCache.allUsers.find(u => u.id === reward.claimedBy);
                    showPopupMessage(
                        '🎯 Already Claimed!',
                        `This reward was already claimed by ${claimedBy?.firstName || 'another user'}. Better luck next time!`,
                        'OK',
                        '',
                        'reward_claimed'
                    );
                    navigate('home');
                    showLoading(false);
                    return;
                }

                const realBalance = await getRealBalance(user.id);
                const newBalance = realBalance + reward.amount;

                await rewardRef.update({
                    claimed: true,
                    claimedBy: user.id,
                    claimedAt: new Date().toISOString()
                });
                await db.collection('users').doc(user.uid || String(user.id)).update({
                    balance: newBalance,
                    totalRewardsClaimed: firebase.firestore.FieldValue.increment(1),
                    updatedAt: new Date().toISOString()
                });

                await recordTransaction(user.id, 'reward', reward.amount,
                    `Reward claimed - ₦${reward.amount}`);

                const updatedUser = await getRealUser(user.id);
                if (updatedUser) {
                    user.balance = updatedUser.balance;
                    user.totalRewardsClaimed = updatedUser.totalRewardsClaimed || 0;
                    saveUser(user);
                }

                toast(`🎉 Claimed ${formatNaira(reward.amount)}!`, 'success');
                showLoading(false);
                await loadUserData(user.id);
                await navigate('home');
                refreshBalanceDisplay();
            } catch (err) {
                toast('Error: ' + err.message, 'error');
                showLoading(false);
            }
        }

        async function adminApproveCustom(subId, userId) {
            const input = document.getElementById(`customAmount_${subId}`);

        async function adminApproveAuto(subId, userId, reward) {
            showLoading(true);
            try {
                const subRef = db.collection('submissions').doc(subId);
                const subDoc = await subRef.get();
                const sub = subDoc.data();

                // Delete screenshot from Supabase
                if (sub.imageUrl) {
                    try {
                        const fileName = sub.imageUrl.split('/').pop();
                        await supabaseClient.storage.from('Screenshot').remove([fileName]);
                        console.log('✅ Screenshot deleted from Supabase');
                    } catch (deleteErr) {
                        console.error('Failed to delete screenshot:', deleteErr);
                        // Continue anyway - don't block approval
                    }
                }

                await subRef.update({
                    status: 'approved',
                    updatedAt: new Date().toISOString(),
                    processed: true,
                    imageDeleted: true,
                    imageDeletedAt: new Date().toISOString()
                });

                let user = await getRealUser(userId);
                if (!user) {
                    const query = await db.collection('users').where('uid', '==', String(userId)).get();
                    if (!query.empty) user = query.docs[0].data();
                }
                if (!user) { toast('User not found', 'error');
                    showLoading(false); return; }

                const newBalance = (user.balance || 0) + reward;
                const newScore = Math.min(100, (user.score || 0) + CONFIG.SCORE_INCREMENT);

                await db.collection('users').doc(user.uid || String(user.id)).update({
                    balance: newBalance,
                    score: newScore,
                    updatedAt: new Date().toISOString()
                });

                await recordTransaction(user.id, 'credit', reward,
                    `Task approved - ${sub.taskId || subId}`);

                // Create notification
                await createNotification(
                    user.id,
                    '✅ Task Approved!',
                    `Your task has been approved! ${formatNaira(reward)} added to your wallet instantly! 💰`,
                    'task_approved',
                    'submissions?tab=approved'
                );

                const currentUser = loadUser();
                if (currentUser && (currentUser.id === user.id || currentUser.uid === user.uid)) {
                    currentUser.balance = newBalance;
                    currentUser.score = newScore;
                    saveUser(currentUser);
                    refreshBalanceDisplay();
                    refreshDashboard();
                }

                const task = userDataCache.tasks.find(t => t.id === sub.taskId || t.taskId === sub.taskId);
                const msg = formatTelegramMessage('TASK APPROVED', user, {
                    '💰 Amount': `₦${reward}`,
                    '📋 Task': task?.title || 'Unknown Task',
                    '✅ Status': 'Approved'
                });
                sendTelegramNotification(msg);
                sendPushNotification('✅ Task Approved!', `₦${reward} added to your wallet instantly!`);

                toast(`✅ Approved! ₦${reward} added instantly.`, 'success');

                // Check daily reward (Wednesday/Saturday)
                await checkDailyReward(user);

                // Check if task is complete
                if (task) {
                    const taskRef = db.collection('tasks').doc(task.id || task.taskId);
                    const taskDoc = await taskRef.get();
                    const taskData = taskDoc.data();
                    if (taskData && taskData.performerCount >= taskData.maxPerformers) {
                        await taskRef.update({ status: 'completed' });
                    }
                }

                showLoading(false);
                await loadUserData(loadUser().id);
                adminShowSubmissions();
            } catch (err) {
                toast('Error: ' + err.message, 'error');
                showLoading(false);
            }
        }

        async function adminDeclineSubmission(subId) {
            const reason = prompt('Reason for decline:');
            if (reason === null) return;
            showLoading(true);
            try {
                const subRef = db.collection('submissions').doc(subId);
                const subDoc = await subRef.get();
                const sub = subDoc.data();
                await subRef.update({
                    status: 'declined',
                    declineReason: reason,
                    updatedAt: new Date().toISOString(),
                    processed: true
                });

                const user = await getRealUser(sub.userId);
                if (user) {
                    // Reduce score by 10%
                    const newScore = Math.max(0, (user.score || 50) - 10);
                    await db.collection('users').doc(user.uid || String(user.id)).update({
                        score: newScore,
                        updatedAt: new Date().toISOString()
                    });

                    // If score reaches 0, deduct ₦300
                    if (newScore === 0) {
                        const newBalance = Math.max(0, (user.balance || 0) - 300);
                        await db.collection('users').doc(user.uid || String(user.id)).update({
                            balance: newBalance
                        });
                        await recordTransaction(user.id, 'fee', 300,
                            'Penalty: Score reached 0%');
                        toast('⚠️ Score reached 0%. ₦300 deducted.', 'warning');

                        // Create notification
                        await createNotification(
                            user.id,
                            '⚠️ Score Penalty!',
                            'Your score reached 0% due to task rejection. ₦300 deducted. Please improve your performance.',
                            'score_penalty',
                            'home'
                        );
                    }

                    // Create notification for decline
                    await createNotification(
                        user.id,
                        '❌ Task Declined',
                        `Your task submission was declined. Reason: ${reason}. Your score has been reduced.`,
                        'task_declined',
                        'submissions?tab=declined'
                    );
                }
                toast('Declined! Score reduced by 10%.', 'warning');
                showLoading(false);
                await loadUserData(loadUser().id);
                adminShowSubmissions();
            } catch (err) {
                toast('Error: ' + err.message, 'error');
                showLoading(false);
            }
        }

                await wRef.update({

                    note: reason,
                    updatedAt: new Date().toISOString()

                const user = await getRealUser(w.userId);

                    await db.collection('users').doc(user.uid || String(user.id)).update({
                        balance: (user.balance || 0) + w.amount,
                        updatedAt: new Date().toISOString()
                    });
                    await recordTransaction(w.userId, 'credit', w.amount,
                        `Refund for declined withdrawal (${wId})`);

        let quickShutdownInterval = null;
        let quickReopenInterval = null;

        async function startQuickShutdown() {
            const shutdownHours = parseInt(document.getElementById('shutdownHours').value) || 0;
            const shutdownMinutes = parseInt(document.getElementById('shutdownMinutes').value) || 0;
            const shutdownSeconds = parseInt(document.getElementById('shutdownSeconds').value) || 0;
            const reopenHours = parseInt(document.getElementById('reopenHours').value) || 0;
            const reopenMinutes = parseInt(document.getElementById('reopenMinutes').value) || 0;
            const reopenSeconds = parseInt(document.getElementById('reopenSeconds').value) || 0;
            const message = document.getElementById('quickShutdownMessage').value.trim() ||
                "This APP is temporarily closed. Please return at the scheduled time.";

            // Validate
            const totalShutdown = shutdownHours * 3600 + shutdownMinutes * 60 + shutdownSeconds;
            const totalReopen = reopenHours * 3600 + reopenMinutes * 60 + reopenSeconds;

            if (totalShutdown < 1 || totalReopen < 1) {
                toast('❌ Please enter valid times (minimum 1 second)', 'error');
                return;
            }

            const btn = document.getElementById('quickShutdownBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Processing...';
            showLoading(true);

            try {
                const now = new Date();

                const shutdownTime = new Date(now);
                shutdownTime.setHours(
                    shutdownHours,
                    shutdownMinutes,
                    shutdownSeconds,
                    0
                );

                const reopenTime = new Date(shutdownTime);
                reopenTime.setHours(
                    reopenHours,
                    reopenMinutes,
                    reopenSeconds,
                    0
                );

                // If shutdown time is in the past, set for tomorrow
                if (shutdownTime < now) {
                    shutdownTime.setDate(shutdownTime.getDate() + 1);
                    reopenTime.setDate(reopenTime.getDate() + 1);
                }

                // If reopen time is before shutdown time, set for next day
                if (reopenTime <= shutdownTime) {
                    reopenTime.setDate(reopenTime.getDate() + 1);
                }

                await db.collection('systemConfig').doc('main').set({
                    shutdown: {
                        enabled: true,
                        closeHour: shutdownTime.getHours(),
                        closeMinute: shutdownTime.getMinutes(),
                        closeSecond: shutdownTime.getSeconds(),
                        reopenHour: reopenTime.getHours(),
                        reopenMinute: reopenTime.getMinutes(),
                        reopenSecond: reopenTime.getSeconds(),
                        message: message,
                        notifyUsers: [],
                        isShutdown: false,
                        scheduledAt: new Date().toISOString()
                    }
                }, { merge: true });

                toast(`✅ Shutdown scheduled!`, 'success');

                document.getElementById('quickShutdownStatus').style.display = 'block';
                startQuickCountdown(shutdownTime, reopenTime);

                btn.disabled = false;
                btn.textContent = '✅ Scheduled';
                showLoading(false);

            } catch (err) {
                toast('❌ Error: ' + err.message, 'error');
                btn.disabled = false;
                btn.textContent = '⏰ Start Shutdown';
                showLoading(false);
            }
        }

        function startQuickCountdown(shutdownTime, reopenTime) {
            if (quickShutdownInterval) clearInterval(quickShutdownInterval);
            if (quickReopenInterval) clearInterval(quickReopenInterval);

            // Shutdown countdown
            quickShutdownInterval = setInterval(() => {
                const now = new Date();
                const diff = Math.max(0, Math.floor((shutdownTime - now) / 1000));

                if (diff <= 0) {
                    clearInterval(quickShutdownInterval);
                    document.getElementById('quickStatusLabel').textContent = '🔴 APP IS SHUTDOWN!';
                    document.getElementById('quickCountdownTimer').textContent = '00:00:00';
                    document.getElementById('quickCountdownTimer').style.color = 'var(--destructive)';
                    document.getElementById('quickStatusMessage').textContent = '🔴 APP is currently offline';

                    startQuickReopenCountdown(reopenTime);
                    return;
                }

                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;
                document.getElementById('quickStatusLabel').textContent = '⏰ Shutting down in...';
                document.getElementById('quickCountdownTimer').textContent =
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                document.getElementById('quickCountdownTimer').style.color = 'var(--warning)';
                document.getElementById('quickStatusMessage').textContent =
                    `⏰ APP will close in ${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }

        function startQuickReopenCountdown(reopenTime) {
            quickReopenInterval = setInterval(() => {
                const now = new Date();
                const diff = Math.max(0, Math.floor((reopenTime - now) / 1000));

                if (diff <= 0) {
                    clearInterval(quickReopenInterval);
                    document.getElementById('quickStatusLabel').textContent = '🟢 APP IS OPEN!';
                    document.getElementById('quickReopenTimer').textContent = '00:00:00';
                    document.getElementById('quickStatusMessage').textContent = '🟢 APP is now online!';
                    document.getElementById('quickCountdownTimer').textContent = '🟢 OPEN';
                    document.getElementById('quickCountdownTimer').style.color = 'var(--success)';

                    db.collection('systemConfig').doc('main').update({
                        'shutdown.isShutdown': false,
                        'shutdown.enabled': false
                    });

                    toast('🟢 APP is now open!', 'success');
                    return;
                }

                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;
                document.getElementById('quickReopenTimer').textContent =
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                document.getElementById('quickStatusMessage').textContent =
                    `🟢 Reopening in ${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }

                <div class="card">
                    <h4 style="font-weight:700;margin-bottom:12px;">📋 Duplicate Tasks (${duplicates.length} groups)</h4>
                    ${duplicates.length === 0 ? `<div class="empty-state"><div class="icon">✅</div><p>No duplicates found.</p></div>` :
                        duplicates.map(group => `
                            <div style="padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;">
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                                    <div><h4 style="font-weight:700;">${group.task?.title || 'Unknown'}</h4><p style="font-size:12px;color:var(--text-muted);">${group.count} submissions</p></div>
                                    <span class="badge badge-warning">${group.count} duplicates</span>
                                </div>
                                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">${group.submissions.map(s => {
                                    const user = userDataCache.allUsers.find(u => u.id === s.userId);
                                    return `<div style="padding:8px;border:1px solid var(--border);border-radius:6px;"><p style="font-weight:600;font-size:13px;">${user?.firstName || 'Unknown'}</p><p style="font-size:11px;color:var(--text-muted);">${formatDateTime(s.createdAt)}</p><span class="badge ${s.status === 'approved' ? 'badge-success' : s.status === 'declined' ? 'badge-destructive' : 'badge-warning'}" style="font-size:10px;">${s.status}</span></div>`;
                                }).join('')}</div>
                                <div style="display:flex;gap:8px;margin-top:12px;">
                                    <button onclick="adminApproveAllDuplicates('${group.taskId}')" class="btn btn-sm btn-success">✅ Approve All</button>
                                    <button onclick="adminDeclineAllDuplicates('${group.taskId}')" class="btn btn-sm btn-destructive">❌ Decline All</button>
                                </div>
                            </div>
                        `).join('')
                    }
                </div>
                <button onclick="adminShowDashboard()" class="btn btn-secondary btn-block" style="margin-top:12px;">← Back</button>
            `;
        }

        async function adminApproveAllDuplicates(taskId) {
            if (!confirm('Approve all duplicates for this task?')) return;
            showLoading(true);
            try {
                const subs = userDataCache.submissions.filter(s =>
                    (s.taskId === taskId || s.taskId === taskId) && s.status === 'pending'
                );
                for (const s of subs) {
                    await adminApproveAuto(s.id, s.userId, 30);
                }
                toast('All duplicates approved!', 'success');
                showLoading(false);
                await loadUserData(loadUser().id);
                adminShowDuplicateTasks();
            } catch (err) {
                toast('Error: ' + err.message, 'error');
                showLoading(false);
            }
        }

        async function adminDeclineAllDuplicates(taskId) {
            if (!confirm('Decline all duplicates for this task?')) return;
            showLoading(true);
            try {
                const subs = userDataCache.submissions.filter(s =>
                    (s.taskId === taskId || s.taskId === taskId) && s.status === 'pending'
                );
                for (const s of subs) {
                    await db.collection('submissions').doc(s.id).update({
                        status: 'declined',
                        declineReason: 'Duplicate task',
                        updatedAt: new Date().toISOString(),
                        processed: true
                    });
                }
                toast('All duplicates declined!', 'warning');
                showLoading(false);
                await loadUserData(loadUser().id);
                adminShowDuplicateTasks();
            } catch (err) {
                toast('Error: ' + err.message, 'error');
                showLoading(false);
            }
        }

        // ─── ADMIN: POPUP CREATOR ────────────────────────────────────
        function adminShowPopupCreator() {
            document.getElementById('adminContent').innerHTML = `
                <div class="card">
                    <h4 style="font-weight:700;margin-bottom:12px;">📬 Create Popup Message</h4>
                    <div class="form-group"><label class="label">Title</label><input type="text" id="popupTitle" class="input" placeholder="Popup title" /></div>
                    <div class="form-group"><label class="label">Description</label><input type="text" id="popupDesc" class="input" placeholder="Popup description" /></div>
                    <div class="form-group"><label class="label">Target Users</label><select id="popupTarget" class="select"><option value="all">All Users</option><option value="cobra">🐍 COBRA</option><option value="lieutenant">⭐ LIEUTENANT</option><option value="commander">👑 COMMANDER</option><option value="general">🏆 GENERAL</option></select></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group"><label class="label">Button Name (optional)</label><input type="text" id="popupBtnName" class="input" placeholder="Learn More" /></div>
                        <div class="form-group"><label class="label">Button Link</label><input type="url" id="popupBtnLink" class="input" placeholder="https://..." /></div>
                    </div>
                    <div class="form-group"><label class="label">Send Type</label><select id="popupSendType" class="select"><option value="one-time">One-Time Send</option><option value="two-time">Two-Time Send</option></select></div>
                    <button onclick="adminSendPopup()" class="btn btn-primary btn-block btn-lg">📤 Send Popup</button>
                    <button onclick="adminShowDashboard()" class="btn btn-secondary btn-block" style="margin-top:8px;">Back</button>
                </div>
            `;
        }

        async function adminSendPopup() {
            const title = document.getElementById('popupTitle').value.trim();
            const desc = document.getElementById('popupDesc').value.trim();
            const target = document.getElementById('popupTarget').value;
            const btnName = document.getElementById('popupBtnName').value.trim();
            const btnLink = document.getElementById('popupBtnLink').value.trim();
            const sendType = document.getElementById('popupSendType').value;

            if (!title || !desc) { toast('Title and description required', 'error'); return; }
            showLoading(true);
            try {
                await db.collection('popups').add({
                    id: Date.now() + Math.random() * 1000,
                    title,
                    description: desc,
                    targetTier: target,
                    hasButton: !!btnName && !!btnLink,
                    buttonName: btnName || '',
                    buttonLink: btnLink || '',
                    sendType: sendType,
                    sentAt: new Date().toISOString(),
                    sentCount: 0,
                    active: true
                });
                const user = loadUser();
                const msg = formatTelegramMessage('POPUP SENT', user, {
                    '📬 Title': title,
                    '🎯 Target': target,
                    '📤 Type': sendType
                });
                sendTelegramNotification(msg);
                toast('✅ Popup sent successfully!', 'success');
                showLoading(false);
                adminShowDashboard();
            } catch (err) {
                toast('Error: ' + err.message, 'error');
                showLoading(false);
            }
        }

        // ─── ADMIN: APP CONTENT ──────────────────────────────────────
        function adminShowAppContent() {
            const content = userDataCache.appContent || {};
            document.getElementById('adminContent').innerHTML = `
                <div class="card">
                    <h4 style="font-weight:700;margin-bottom:12px;">📺 App Content</h4>
                    <div class="form-group"><label class="label">Tutorial Video URL (YouTube embed)</label><input type="url" id="adminVideoUrl" class="input" placeholder="https://www.youtube.com/embed/xxxxx" value="${content.tutorialVideo?.url || ''}" /></div>
                    <div class="form-group"><label class="label">Video Title</label><input type="text" id="adminVideoTitle" class="input" placeholder="How to use NairaMaster" value="${content.tutorialVideo?.title || ''}" /></div>
                    <hr class="divider" />
                    <div class="form-group"><label class="label">Documentation Title</label><input type="text" id="adminDocTitle" class="input" placeholder="User Guide" value="${content.documentation?.title || ''}" /></div>
                    <div class="form-group"><label class="label">Documentation Content</label><textarea id="adminDocContent" class="input" rows="6" placeholder="Full documentation text...">${content.documentation?.content || ''}</textarea></div>
                    <button onclick="adminSaveAppContent()" class="btn btn-primary btn-block btn-lg">💾 Save Content</button>
                    <button onclick="adminShowDashboard()" class="btn btn-secondary btn-block" style="margin-top:8px;">Back</button>
                </div>
            `;
        }

        async function adminSaveAppContent() {
            const videoUrl = document.getElementById('adminVideoUrl').value.trim();
            const videoTitle = document.getElementById('adminVideoTitle').value.trim();
            const docTitle = document.getElementById('adminDocTitle').value.trim();
            const docContent = document.getElementById('adminDocContent').value.trim();

            if (!videoUrl || !docTitle || !docContent) {
                toast('Please fill all fields', 'error');
                return;
            }
            showLoading(true);
            try {
                await db.collection('appContent').doc('main').set({
                    tutorialVideo: {
                        url: videoUrl,
                        title: videoTitle || 'Tutorial Video',
                        updatedAt: new Date().toISOString()
                    },
                    documentation: {
                        title: docTitle || 'Documentation',
                        content: docContent,
                        updatedAt: new Date().toISOString()
                    }
                }, { merge: true });
                toast('✅ Content saved!', 'success');
                showLoading(false);
                adminShowDashboard();
            } catch (err) {
                toast('Error: ' + err.message, 'error');
                showLoading(false);
            }
        }

        // ─── ADMIN: SYSTEM SETTINGS ──────────────────────────────────
        function adminShowSystemSettings() {
            document.getElementById('adminContent').innerHTML = `
                <div class="card">
                    <h4 style="font-weight:700;margin-bottom:12px;">⚙️ System Settings</h4>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group"><label class="label">Min Withdrawal (₦)</label><input type="number" id="adminMinWithdrawal" class="input" value="${CONFIG.MIN_WITHDRAWAL}" /></div>
                        <div class="form-group"><label class="label">Withdrawal Fee (₦)</label><input type="number" id="adminWithdrawalFee" class="input" value="${CONFIG.WITHDRAWAL_FEE}" /></div>
                        <div class="form-group"><label class="label">Reward Per Task (₦)</label><input type="number" id="adminRewardPerTask" class="input" value="${CONFIG.REWARD_PER_TASK}" /></div>
                        <div class="form-group"><label class="label">Max Performers Per Task</label><input type="number" id="adminMaxPerformers" class="input" value="${CONFIG.MAX_PERFORMERS}" /></div>
                        <div class="form-group"><label class="label">Auto-Refresh Interval (ms)</label><input type="number" id="adminRefreshInterval" class="input" value="${CONFIG.AUTO_REFRESH_INTERVAL}" /></div>
                        <div class="form-group"><label class="label">Score Increment</label><input type="number" id="adminScoreInc" class="input" value="${CONFIG.SCORE_INCREMENT}" /></div>
                    </div>
                    <button onclick="adminSaveSystemSettings()" class="btn btn-primary btn-block btn-lg">💾 Save Settings</button>
                    <button onclick="adminShowDashboard()" class="btn btn-secondary btn-block" style="margin-top:8px;">Back</button>
                </div>
            `;
        }

        async function adminSaveSystemSettings() {
            const minWithdrawal = parseInt(document.getElementById('adminMinWithdrawal').value);
            const withdrawalFee = parseInt(document.getElementById('adminWithdrawalFee').value);
            const rewardPerTask = parseInt(document.getElementById('adminRewardPerTask').value);
            const maxPerformers = parseInt(document.getElementById('adminMaxPerformers').value);
            const refreshInterval = parseInt(document.getElementById('adminRefreshInterval').value);
            const scoreInc = parseInt(document.getElementById('adminScoreInc').value);

            if (!minWithdrawal || !withdrawalFee || !rewardPerTask || !maxPerformers) {
                toast('Please fill all fields', 'error');
                return;
            }

            showLoading(true);
            try {
                CONFIG.MIN_WITHDRAWAL = minWithdrawal;
                CONFIG.WITHDRAWAL_FEE = withdrawalFee;
                CONFIG.REWARD_PER_TASK = rewardPerTask;
                CONFIG.MAX_PERFORMERS = maxPerformers;
                CONFIG.AUTO_REFRESH_INTERVAL = refreshInterval || 30000;
                CONFIG.SCORE_INCREMENT = scoreInc || 5;

                await db.collection('systemConfig').doc('main').set({
                    minWithdrawal,
                    withdrawalFee,
                    rewardPerTask,
                    maxPerformers,
                    autoRefreshInterval: refreshInterval || 30000,
                    scoreIncrement: scoreInc || 5,
                    updatedAt: new Date().toISOString()
                }, { merge: true });

                toast('✅ Settings saved!', 'success');
                showLoading(false);
                adminShowDashboard();
            } catch (err) {
                toast('Error: ' + err.message, 'error');
                showLoading(false);
            }
        }

        function adminShowDashboard() {
            render();
        }

        // ─── DAILY REWARD ─────────────────────────────────────────────
        async function checkDailyReward(user) {
            const today = new Date().getDay();
            // Only on Wednesday (3) and Saturday (6)
            if (today !== 3 && today !== 6) return;

            const todayStr = getTodayString();
            const submissions = await db.collection('submissions')
                .where('userId', '==', user.id)
                .where('status', '==', 'approved')
                .get();

            const todaySubs = submissions.docs.filter(doc => {
                const date = doc.data().createdAt.split('T')[0];
                return date === todayStr;
            });

            if (todaySubs.length >= 2) {
                const newBalance = (user.balance || 0) + 100;
                await db.collection('users').doc(user.uid || String(user.id)).update({
                    balance: newBalance
                });

                await recordTransaction(user.id, 'reward', 100,
                    'Daily reward (Wednesday/Saturday bonus)');

                showPopupMessage(
                    '🎉 Daily Reward!',
                    'You earned ₦100 for completing 2+ tasks today! Keep it up! 💪',
                    'OK',
                    '',
                    'daily_reward'
                );

                await createNotification(
                    user.id,
                    '🎉 Daily Reward!',
                    'You earned ₦100 for completing tasks today! Keep it up! 💪',
                    'daily_reward',
                    'home'
                );
            }
        }

        // ─── INACTIVITY NOTIFICATIONS ───────────────────────────────
        let lastActivityTime = Date.now();

        document.addEventListener('click', () => { lastActivityTime = Date.now(); });
        document.addEventListener('scroll', () => { lastActivityTime = Date.now(); });
        document.addEventListener('mousemove', () => { lastActivityTime = Date.now(); });
        document.addEventListener('touchstart', () => { lastActivityTime = Date.now(); });
        document.addEventListener('keydown', () => { lastActivityTime = Date.now(); });

        setInterval(() => {
            const inactiveTime = (Date.now() - lastActivityTime) / 60000;
            if (inactiveTime >= 10) {
                sendPushNotification(
                    '📋 New Tasks Available!',
                    'Would you mind trying the new tasks uploaded by Admin? Check them out now! 🚀'
                );
                lastActivityTime = Date.now();
            }
        }, 60000);

        // ─── MIDNIGHT NOTIFICATION ────────────────────────────────────
        function scheduleMidnightNotification() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            const timeUntilMidnight = midnight - now;

            setTimeout(() => {
                sendPushNotification(
                    '🌅 Rise and Shine!',
                    'New day, new tasks! Start earning on NairaMaster.ng today! 💰'
                );
                scheduleMidnightNotification();
            }, timeUntilMidnight);
        }

        scheduleMidnightNotification();

        // ─── INIT ─────────────────────────────────────────────────────
        const user = loadUser();
        if (user) {
            render();
            loadUserData(user.id).then(() => {
                navigate('home');
                setupRealTimeListeners(user);
                registerServiceWorker();
                handleNotificationPermission();
            });
        } else {
            render();
        }

        console.log('🚀 NairaMaster.ng v6.0 – PROFESSIONAL BUILD COMPLETE');

        console.log('🔑 Forgot Password - Added');
        console.log('📊 Score Penalty - Added');
        console.log('🎁 Daily Reward - Added');
        console.log('🚫 Task Block - Added');
        console.log('🔥 All errors fixed - Ready for production!');
    </script>
