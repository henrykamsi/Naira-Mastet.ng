<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>Admin Login - NairaMaster.ng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0A6C3A;
            --primary-dark: #064A26;
            --primary-light: #E8F5EE;
            --primary-gradient: linear-gradient(135deg, #0A6C3A, #064A26);
            --background: #f0f2f5;
            --card: #ffffff;
            --border: #e9ecef;
            --text: #1a1a2e;
            --text-muted: #6c757d;
            --destructive: #dc3545;
            --success: #28a745;
            --radius: 16px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            background: var(--card);
            border-radius: var(--radius);
            padding: 40px 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-logo img {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .login-logo h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .login-logo p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .login-logo .admin-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 9999px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text);
        }

        .input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--background);
            color: var(--text);
            font-size: 14px;
            transition: border var(--transition);
            font-family: inherit;
        }

        .input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(10, 108, 58, 0.1);
        }

        .input::placeholder {
            color: var(--text-muted);
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        .input-icon-wrapper .input {
            padding-left: 44px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            transition: var(--transition);
            border: 1px solid transparent;
            width: 100%;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(10, 108, 58, 0.3);
        }

        .btn-google {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-google:hover {
            background: #f5f5f5;
        }

        .btn-biometric {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-biometric:hover {
            background: var(--border);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn.loading .loading-spinner {
            display: inline-block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .back-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .back-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .biometric-section {
            margin-top: 12px;
        }

        .biometric-section .btn {
            font-size: 14px;
            padding: 10px;
        }

        .biometric-section .btn .icon {
            font-size: 20px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 28px 20px;
            }
            .login-logo h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginContainer">
        <!-- Logo -->
        <div class="login-logo">
            <img src="https://cdn.phototourl.com/free/2026-07-18-edf62e79-cb03-48b6-a74a-345e7ea2db36.jpg" alt="NairaMaster" />
            <h1>🔐 Admin Login</h1>
            <p>Sign in to manage your platform</p>
            <span class="admin-badge">🔒 Secure Access</span>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Success Message -->
        <div class="success-message" id="successMessage"></div>

        <!-- Email/Password Login -->
        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label class="label">📧 Email Address</label>
                <div class="input-icon-wrapper">
                    <span class="icon">📧</span>
                    <input type="email" id="loginEmail" class="input" placeholder="admin@yourdomain.com" required autocomplete="email" />
                </div>
            </div>

            <div class="form-group">
                <label class="label">🔑 Password</label>
                <div class="input-icon-wrapper">
                    <span class="icon">🔑</span>
                    <input type="password" id="loginPassword" class="input" placeholder="Enter your password" required autocomplete="current-password" />
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span class="btn-text">🔓 Login to Admin</span>
                <span class="loading-spinner"></span>
            </button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <span>or continue with</span>
        </div>

        <!-- Google Login -->
        <button class="btn btn-google" onclick="signInWithGoogle()" id="googleBtn">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#EA4335" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Sign in with Google
        </button>

        <!-- Biometric Login -->
        <div class="biometric-section">
            <button class="btn btn-biometric" onclick="signInWithBiometric()" id="biometricBtn">
                <span class="icon">🔐</span>
                <span>Sign in with Biometric</span>
            </button>
        </div>

        <!-- Back Link -->
        <div class="back-link">
            <a href="/">← Back to APP</a>
        </div>
    </div>

    <!-- ============================================================
    SCRIPTS
    ============================================================ -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>

    <script>
        // ─── CONFIG ───────────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyBhxYg140CQePqQvxqxwxAN9znbwhZuCDU",
            authDomain: "hgt-naira-master.firebaseapp.com",
            projectId: "hgt-naira-master",
            storageBucket: "hgt-naira-master.firebasestorage.app",
            messagingSenderId: "709693242234",
            appId: "1:709693242234:web:3df7554781e3b5f465f4c3",
            measurementId: "G-JJK4G9406L"
        };

        const firebaseApp = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let loading = false;

        // ─── DOM ELEMENTS ─────────────────────────────────────────────
        const loginForm = document.getElementById('loginForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const googleBtn = document.getElementById('googleBtn');
        const biometricBtn = document.getElementById('biometricBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // ─── HELPERS ──────────────────────────────────────────────────
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        function showSuccess(msg) {
            successMessage.textContent = msg;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
            setTimeout(() => successMessage.classList.remove('show'), 5000);
        }

        function setLoading(btn, state) {
            loading = state;
            if (state) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ─── CHECK ADMIN STATUS ──────────────────────────────────────
        async function checkAdminStatus(user) {
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists && userDoc.data().isAdmin === true) {
                    // ✅ User is admin - redirect to admin dashboard
                    showSuccess('✅ Admin access granted! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/admin.html';
                    }, 1000);
                    return true;
                } else {
                    // ❌ User is not admin - sign out and show error
                    await auth.signOut();
                    showError('❌ Access denied. You are not an admin.');
                    return false;
                }
            } catch (err) {
                showError('❌ Error checking admin status: ' + err.message);
                return false;
            }
        }

        // ─── EMAIL/PASSWORD LOGIN ────────────────────────────────────
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            setLoading(loginBtn, true);

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Check if admin
                await checkAdminStatus(user);

            } catch (err) {
                let msg = 'Invalid email or password';
                if (err.code === 'auth/user-not-found') msg = 'No account found with this email';
                else if (err.code === 'auth/wrong-password') msg = 'Incorrect password';
                else if (err.code === 'auth/too-many-requests') msg =
                'Too many failed attempts. Please wait and try again.';
                else msg = err.message;
                showError('❌ ' + msg);
                setLoading(loginBtn, false);
            }
        });

        // ─── GOOGLE LOGIN ─────────────────────────────────────────────
        async function signInWithGoogle() {
            setLoading(googleBtn, true);

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                // Check if admin
                await checkAdminStatus(user);

            } catch (err) {
                if (err.code === 'auth/popup-closed-by-user') {
                    showError('❌ Sign-in cancelled');
                } else {
                    showError('❌ Google sign-in failed: ' + err.message);
                }
                setLoading(googleBtn, false);
            }
        }

        // ─── BIOMETRIC LOGIN (WebAuthn) ─────────────────────────────
        async function signInWithBiometric() {
            // Check if biometric is supported
            if (!window.PublicKeyCredential) {
                showError('❌ Biometric authentication is not supported on this device/browser');
                return;
            }

            // Check if we have stored credentials
            const storedCredentialId = localStorage.getItem('admin_biometric_credential');

            if (!storedCredentialId) {
                // First time - enroll biometric
                await enrollBiometric();
                return;
            }

            // Authenticate with biometric
            setLoading(biometricBtn, true);

            try {
                // Get the credential
                const credentialId = Uint8Array.from(atob(storedCredentialId), c => c.charCodeAt(0));

                const publicKeyCredentialRequestOptions = {
                    challenge: Uint8Array.from(
                        crypto.getRandomValues(new Uint8Array(32))
                    ),
                    allowCredentials: [{
                        id: credentialId,
                        type: 'public-key',
                        transports: ['internal', 'usb', 'nfc', 'ble']
                    }],
                    timeout: 60000,
                    userVerification: 'required',
                };

                const assertion = await navigator.credentials.get({
                    publicKey: publicKeyCredentialRequestOptions
                });

                // Success - biometric verified
                showSuccess('✅ Biometric verified! Checking admin status...');

                // Check if there's a user logged in
                const user = auth.currentUser;
                if (user) {
                    await checkAdminStatus(user);
                } else {
                    // If no user, redirect to email login
                    showError('⚠️ Please login with email first, then enroll biometric');
                    setLoading(biometricBtn, false);
                }

            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    showError('❌ Biometric authentication cancelled');
                } else if (err.name === 'SecurityError') {
                    showError('❌ Security error. Please try again.');
                } else {
                    showError('❌ Biometric authentication failed: ' + err.message);
                }
                setLoading(biometricBtn, false);
            }
        }

        // ─── ENROLL BIOMETRIC ─────────────────────────────────────────
        async function enrollBiometric() {
            if (!window.PublicKeyCredential) {
                showError('❌ Biometric is not supported on this device');
                return;
            }

            const user = auth.currentUser;
            if (!user) {
                showError('❌ Please login with email/Google first before enrolling biometric');
                return;
            }

            setLoading(biometricBtn, true);

            try {
                // Create a new credential
                const publicKeyCredentialCreationOptions = {
                    challenge: Uint8Array.from(
                        crypto.getRandomValues(new Uint8Array(32))
                    ),
                    rp: {
                        name: 'NairaMaster.ng',
                        id: window.location.hostname,
                    },
                    user: {
                        id: Uint8Array.from(user.uid, c => c.charCodeAt(0)),
                        name: user.email || 'admin@nairamaster.ng',
                        displayName: 'Admin User',
                    },
                    pubKeyCredParams: [{
                        type: 'public-key',
                        alg: -7, // ES256
                    }],
                    authenticatorSelection: {
                        authenticatorAttachment: 'platform',
                        requireResidentKey: false,
                        userVerification: 'required',
                    },
                    timeout: 60000,
                    attestation: 'none',
                };

                const credential = await navigator.credentials.create({
                    publicKey: publicKeyCredentialCreationOptions
                });

                // Store credential ID
                const credentialId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
                localStorage.setItem('admin_biometric_credential', credentialId);

                showSuccess('✅ Biometric enrolled successfully! You can now use it to login.');
                setLoading(biometricBtn, false);

            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    showError('❌ Biometric enrollment cancelled');
                } else {
                    showError('❌ Biometric enrollment failed: ' + err.message);
                }
                setLoading(biometricBtn, false);
            }
        }

        // ─── CHECK FOR SAVED BIOMETRIC ──────────────────────────────
        async function checkBiometricAvailability() {
            const storedCredentialId = localStorage.getItem('admin_biometric_credential');
            if (storedCredentialId && window.PublicKeyCredential) {
                // Check if device supports biometric
                try {
                    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                    if (available) {
                        // Show biometric option
                        document.querySelector('.biometric-section').style.display = 'block';
                        // Check if user is already logged in
                        const user = auth.currentUser;
                        if (user) {
                            biometricBtn.innerHTML = `
                                <span class="icon">🔐</span>
                                <span>Sign in with Biometric</span>
                            `;
                        } else {
                            biometricBtn.innerHTML = `
                                <span class="icon">🔐</span>
                                <span>Enroll Biometric</span>
                            `;
                        }
                    }
                } catch (e) {
                    // Biometric not available
                    document.querySelector('.biometric-section').style.display = 'none';
                }
            } else {
                document.querySelector('.biometric-section').style.display = 'none';
            }
        }

        // ─── AUTO-LOGIN CHECK ─────────────────────────────────────────
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // User is already logged in - check if admin
                const isAdmin = await checkAdminStatus(user);
                if (isAdmin) {
                    // Will redirect inside checkAdminStatus
                } else {
                    // Not admin - sign out
                    await auth.signOut();
                }
            } else {
                // No user - check biometric availability
                checkBiometricAvailability();
                // Show form
                document.getElementById('loginContainer').style.opacity = '1';
            }
        });

        // ─── KEYBOARD SHORTCUTS ──────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            // Ctrl + Shift + L = Focus email
            if (e.ctrlKey && e.shiftKey && e.key === 'L') {
                e.preventDefault();
                loginEmail.focus();
            }
            // Ctrl + Shift + P = Focus password
            if (e.ctrlKey && e.shiftKey && e.key === 'P') {
                e.preventDefault();
                loginPassword.focus();
            }
        });

        console.log('🔐 Admin Login Page Loaded');
        console.log('📧 Email/Password Login: Ready');
        console.log('🔑 Google Login: Ready');
        console.log('🔐 Biometric Login: ' + (window.PublicKeyCredential ? 'Supported' : 'Not Supported'));
        console.log('🔄 Auto-redirect to Admin Dashboard on success');
    </script>
</body>
</html>
