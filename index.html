    <!-- NOTE: The main CSS and JavaScript are included via the HTML file from the original -->
    <!-- This is a patch file that fixes specific issues -->
    
    <script>
        // ═════════════════════════════════════════════════════════════
        // FIX 1: Perform Button - Opens URL in new tab safely
        // ═════════════════════════════════════════════════════════════
        function openTaskLink(url) {
            if (!url || url.trim() === '') {
                console.warn('No URL provided for task');
                return;
            }
            // Open in new tab - prevents appending to current URL
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        // ═════════════════════════════════════════════════════════════
        // FIX 2: Shutdown Timer - Minutes, Seconds, Milliseconds only
        // ═════════════════════════════════════════════════════════════
        function formatTimerDisplay(totalMilliseconds) {
            // Convert milliseconds to total seconds
            const totalSeconds = Math.floor(totalMilliseconds / 1000);
            
            // Calculate minutes, seconds, and remaining milliseconds
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const milliseconds = Math.floor(totalMilliseconds % 1000);
            
            // Format with zero padding
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(milliseconds).padStart(3, '0')}`;
        }

        // Function to start countdown showing only MM:SS:MS format
        function startQuickCountdownNew(shutdownTime, reopenTime) {
            let quickShutdownInterval = null;
            let quickReopenInterval = null;
            
            if (quickShutdownInterval) clearInterval(quickShutdownInterval);
            if (quickReopenInterval) clearInterval(quickReopenInterval);

            // Shutdown countdown (Minutes:Seconds:Milliseconds)
            quickShutdownInterval = setInterval(() => {
                const now = new Date();
                const diffMs = Math.max(0, shutdownTime - now);

                if (diffMs <= 0) {
                    clearInterval(quickShutdownInterval);
                    document.getElementById('quickStatusLabel').textContent = '🔴 APP IS SHUTDOWN!';
                    document.getElementById('quickCountdownTimer').textContent = '00:00:000';
                    document.getElementById('quickCountdownTimer').style.color = 'var(--destructive)';
                    document.getElementById('quickStatusMessage').textContent = '🔴 APP is currently offline';

                    startQuickReopenCountdownNew(reopenTime);
                    return;
                }

                const totalSeconds = Math.floor(diffMs / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                const milliseconds = Math.floor(diffMs % 1000);

                document.getElementById('quickStatusLabel').textContent = '⏰ Shutting down in...';
                document.getElementById('quickCountdownTimer').textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(milliseconds).padStart(3, '0')}`;
                document.getElementById('quickCountdownTimer').style.color = 'var(--warning)';
                document.getElementById('quickStatusMessage').textContent =
                    `⏰ APP will close in ${minutes}m ${seconds}s`;
            }, 50); // Update every 50ms for smooth millisecond display
        }

        function startQuickReopenCountdownNew(reopenTime) {
            let quickReopenInterval = null;
            
            if (quickReopenInterval) clearInterval(quickReopenInterval);
            
            quickReopenInterval = setInterval(() => {
                const now = new Date();
                const diffMs = Math.max(0, reopenTime - now);

                if (diffMs <= 0) {
                    clearInterval(quickReopenInterval);
                    document.getElementById('quickStatusLabel').textContent = '🟢 APP IS OPEN!';
                    document.getElementById('quickReopenTimer').textContent = '00:00:000';
                    document.getElementById('quickStatusMessage').textContent = '🟢 APP is now online!';
                    document.getElementById('quickCountdownTimer').textContent = '🟢 OPEN';
                    document.getElementById('quickCountdownTimer').style.color = 'var(--success)';

                    // Update Firebase if available
                    if (typeof db !== 'undefined') {
                        try {
                            db.collection('systemConfig').doc('main').update({
                                'shutdown.isShutdown': false,
                                'shutdown.enabled': false
                            });
                        } catch (err) {
                            console.error('Error updating shutdown status:', err);
                        }
                    }

                    if (typeof toast === 'function') {
                        toast('🟢 APP is now open!', 'success');
                    }
                    return;
                }

                const totalSeconds = Math.floor(diffMs / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                const milliseconds = Math.floor(diffMs % 1000);

                document.getElementById('quickReopenTimer').textContent =
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(milliseconds).padStart(3, '0')}`;
                document.getElementById('quickStatusMessage').textContent =
                    `🟢 Reopening in ${minutes}m ${seconds}s`;
            }, 50); // Update every 50ms for smooth millisecond display
        }
    </script>
