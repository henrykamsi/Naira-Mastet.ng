            }
        }

        }

            padding: 40px 20px;

        }

        }

        .toggle {
            position: relative;
            width: 48px;
            height: 26px;
            background: var(--border);
            border-radius: 13px;
            transition: var(--transition);
            cursor: pointer;
        }

            top: 2px;
            left: 2px;
            width: 22px;

            border-radius: 50%;

        .trust-popup {

            top: 50%;

            background: var(--primary-gradient);

            padding: 40px 60px;

        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);

        }
        @keyframes pulse {

            50% { opacity: 0.8; transform: scale(1.02); }
        }
    </style>
